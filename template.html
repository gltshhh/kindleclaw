<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Agenda</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: #fff;
    color: #000;
    font-family: Georgia, "Times New Roman", serif;
    -webkit-font-smoothing: none;
    text-rendering: geometricPrecision;
    overflow: hidden;
  }
  .page {
    width: 100%;
    height: 100%;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
  }
  .hour-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 16px;
  }
  .hour-label {
    font-size: 96px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -2px;
  }
  .hour-blocks {
    display: flex;
    gap: 10px;
  }
  .hour-block {
    display: inline-block;
    width: 76px;
    height: 56px;
    border: 3px solid #000;
    background: #fff;
  }
  .hour-block.filled {
    background: #000;
  }
  .hour-block.current {
    background: #fff;
    border-width: 5px;
  }
  .date {
    font-size: 28px;
    text-align: center;
    margin-top: 8px;
    margin-bottom: 18px;
    border-bottom: 2px solid #000;
    padding-bottom: 16px;
  }
  .heading {
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin: 18px 0 10px;
  }
  ol.tasks {
    list-style: none;
    flex: 1;
  }
  ol.tasks li {
    font-size: 28px;
    line-height: 1.35;
    padding: 10px 0 10px 44px;
    border-bottom: 1px solid #000;
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  ol.tasks li::before {
    content: counter(item) ".";
    counter-increment: item;
    position: absolute;
    left: 0;
    top: 10px;
    font-weight: 700;
    width: 36px;
    text-align: right;
  }
  ol.tasks { counter-reset: item; }
  ol.tasks li .text {
    flex: 1;
    min-width: 0;
  }
  ol.tasks li .countdown {
    flex: 0 0 auto;
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    padding: 2px 10px;
    border: 2px solid #000;
    border-radius: 4px;
  }
  ol.tasks li .countdown.overdue {
    background: #000;
    color: #fff;
  }
  .footer {
    font-size: 14px;
    text-align: center;
    margin-top: 12px;
    color: #000;
    opacity: 0.85;
  }
  .error {
    margin: 80px 24px;
    padding: 24px;
    border: 3px solid #000;
    font-size: 24px;
    line-height: 1.5;
  }
  .error h1 { font-size: 32px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="page">
  {{BODY}}
</div>
</body>
</html>
